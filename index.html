<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>🏛️ 人生博物馆 · 生命足迹</title>
  <!-- Chart.js 轻量图表库 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ========== CSS 变量：浅色/深色主题 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, 'Segoe UI', 'Helvetica Neue', 'Noto Sans', sans-serif;
    }

    :root {
      --bg-page: #f7f4f0;
      --bg-surface: #fffcf9;
      --bg-elevated: #ffffff;
      --text-primary: #2e2b28;
      --text-secondary: #5f4e3e;
      --text-muted: #7a6b5d;
      --border-light: #e9dbd0;
      --border-medium: #d6c9bc;
      --accent-soft: #b7a089;
      --accent-primary: #4f6d7f;
      --accent-success: #6a8e7c;
      --accent-warm: #b56532;
      --shadow-sm: 0 2px 6px rgba(0, 0, 0, 0.03);
      --shadow-md: 0 8px 20px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 16px 32px rgba(0, 0, 0, 0.08);
      --progress-bg: #cfc3b8;
      --progress-fill: #6a8e7c;
      --card-radius: 28px;
      --btn-radius: 40px;
      --transition: all 0.2s ease;
    }

    body.dark {
      --bg-page: #1a1817;
      --bg-surface: #2a2623;
      --bg-elevated: #322d29;
      --text-primary: #ece4db;
      --text-secondary: #c4b6a8;
      --text-muted: #a39282;
      --border-light: #3e3731;
      --border-medium: #5a4f46;
      --accent-soft: #8f7a66;
      --accent-primary: #7a9aad;
      --accent-success: #7fa892;
      --accent-warm: #d08e62;
      --progress-bg: #4a4038;
      --progress-fill: #7fa892;
    }

    body {
      background: var(--bg-page);
      padding: 24px 32px;
      min-height: 100vh;
      color: var(--text-primary);
      transition: background 0.2s, color 0.2s;
    }

    .app {
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ========== 头部 ========== */
    .museum-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .museum-header h1 {
      font-size: 3.2rem;
      font-weight: 400;
      letter-spacing: 6px;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }
    .subhead {
      font-size: 1.05rem;
      color: var(--text-secondary);
      margin-top: 0;
      margin-bottom: 24px;
      border-left: 4px solid var(--accent-soft);
      padding-left: 18px;
      font-style: italic;
    }

    /* 主题切换悬浮按钮 (右上角) */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 32px;
      z-index: 100;
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 60px;
      padding: 10px 16px;
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(8px);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 1.1rem;
      color: var(--text-primary);
      transition: var(--transition);
    }
    .theme-toggle:hover {
      background: var(--bg-surface);
      box-shadow: var(--shadow-lg);
      transform: scale(1.02);
    }

    /* ========== 进度条 ========== */
    .progress-section {
      background: var(--bg-surface);
      border-radius: 40px;
      padding: 12px 20px;
      margin-bottom: 28px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.05), var(--shadow-sm);
      border: 1px solid var(--border-light);
    }
    .progress-bar-container {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .progress-label {
      font-weight: 500;
      min-width: 70px;
      color: var(--text-secondary);
    }
    .progress-track {
      flex: 1;
      height: 18px;
      background: var(--progress-bg);
      border-radius: 30px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--progress-fill);
      border-radius: 30px;
      transition: width 0.3s;
      box-shadow: 0 0 8px var(--accent-success);
    }
    .progress-percent {
      min-width: 45px;
      text-align: right;
      font-weight: 600;
      color: var(--accent-success);
    }

    /* ========== 今日灵感卡片 ========== */
    .inspiration-card {
      background: linear-gradient(135deg, var(--bg-elevated) 0%, var(--bg-surface) 100%);
      border-radius: 24px;
      padding: 18px 24px;
      margin-bottom: 24px;
      border: 1px solid var(--border-light);
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .inspiration-content {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .inspiration-icon {
      font-size: 2.5rem;
      background: var(--accent-primary);
      width: 60px;
      height: 60px;
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .inspiration-text {
      font-size: 1.2rem;
    }
    .inspiration-title {
      font-weight: 600;
      color: var(--accent-primary);
      margin-right: 8px;
    }
    .inspiration-desc {
      color: var(--text-primary);
      font-weight: 500;
    }
    .inspiration-btn {
      background: var(--accent-primary);
      border: none;
      color: white;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      border: 1px solid rgba(255,255,255,0.2);
    }
    .inspiration-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-2px);
    }

    /* ========== 功能按钮栏 ========== */
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 8px;
      margin-bottom: 28px;
    }
    .func-btn {
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      padding: 8px 16px;
      border-radius: var(--btn-radius);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: var(--transition);
      backdrop-filter: blur(2px);
    }
    .func-btn:hover {
      background: var(--bg-surface);
      border-color: var(--accent-soft);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .add-btn {
      background: var(--accent-primary);
      border: none;
      color: white;
      padding: 12px 30px;
      border-radius: 50px;
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 24px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.1);
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
      transition: var(--transition);
    }
    .add-btn:hover {
      filter: brightness(1.1);
      transform: scale(1.01);
    }

    /* ========== 列表视图 ========== */
    .list-view {
      background: var(--bg-surface);
      border-radius: var(--card-radius);
      padding: 20px 18px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border-light);
    }
    .list-header {
      display: grid;
      grid-template-columns: 30px 1.2fr 0.7fr 0.8fr 1fr 0.7fr 0.9fr 70px 110px 40px;
      gap: 8px;
      padding: 10px 8px;
      font-weight: 600;
      color: var(--text-secondary);
      border-bottom: 2px solid var(--border-light);
      margin-bottom: 10px;
      font-size: 0.85rem;
    }
    .list-item {
      display: grid;
      grid-template-columns: 30px 1.2fr 0.7fr 0.8fr 1fr 0.7fr 0.9fr 70px 110px 40px;
      gap: 8px;
      align-items: center;
      padding: 14px 8px;
      border-bottom: 1px solid var(--border-light);
      transition: background 0.1s;
      border-radius: 14px;
    }
    .list-item:nth-child(even) {
      background: rgba(0,0,0,0.02);
    }
    body.dark .list-item:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }
    .list-item:hover {
      background: var(--bg-elevated);
    }
    .item-check {
      text-align: center;
    }
    .item-title {
      font-weight: 500;
      word-break: break-word;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .completed-item {
      opacity: 0.7;
    }
    .completed-item .item-title {
      text-decoration: line-through;
      color: var(--text-muted);
    }
    /* 标签小圆点 */
    .item-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-left: 4px;
    }
    .tag-badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--accent-soft);
      color: white;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
    }
    .tag-badge:hover {
      filter: brightness(1.1);
    }
    .color-picker-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .history-colors {
      display: flex;
      gap: 3px;
      margin-left: 4px;
    }
    .history-dot {
      width: 18px;
      height: 18px;
      border-radius: 18px;
      border: 1px solid var(--border-medium);
      cursor: pointer;
    }
    .delete-btn {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: 0.1s;
    }
    .delete-btn:hover {
      color: #c24a3a;
    }
    .empty-message {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-style: italic;
    }

    /* ========== 排序/筛选栏 ========== */
    .sort-bar {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 18px;
      padding: 10px 18px;
      background: var(--bg-surface);
      border-radius: 40px;
      border: 1px solid var(--border-light);
      flex-wrap: wrap;
    }
    .sort-bar label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
    }
    .sort-bar select {
      padding: 6px 12px;
      border-radius: 30px;
      border: 1px solid var(--border-medium);
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-size: 0.9rem;
      cursor: pointer;
      outline: none;
    }
    .sort-order-btn {
      background: var(--bg-elevated);
      border: 1px solid var(--border-medium);
      border-radius: 30px;
      padding: 6px 14px;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-primary);
    }
    .sort-order-btn:hover {
      background: var(--bg-surface);
      border-color: var(--accent-soft);
    }

    /* ========== 标签筛选条 (新增) ========== */
    .tag-filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 12px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .tag-filter-label {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag-filter-item {
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: var(--transition);
      color: var(--text-primary);
    }
    .tag-filter-item.active {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    /* ========== 模态框 ========== */
    .modal {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: var(--bg-surface);
      border-radius: 32px;
      padding: 28px;
      max-width: 700px;
      width: 90%;
      max-height: 85vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 30px 50px rgba(0,0,0,0.2);
      border: 1px solid var(--border-light);
      color: var(--text-primary);
    }
    .modal-body {
      overflow-y: auto;
      padding-right: 6px;
      flex: 1;
      scroll-behavior: smooth;
    }
    .modal-footer {
      flex-shrink: 0;
      padding-top: 20px;
      margin-top: 10px;
      border-top: 1px solid var(--border-light);
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid var(--border-medium);
      border-radius: 20px;
      font-size: 1rem;
      background: var(--bg-elevated);
      color: var(--text-primary);
    }
    .date-select {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .date-select select {
      flex: 1;
    }
    .capsule-row, .parent-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .inline-check input[type="checkbox"] {
      width: 18px; height: 18px;
      margin: 0;
      cursor: pointer;
      accent-color: var(--accent-primary);
    }
    .color-history-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .color-preview-container {
      margin-top: 8px;
      margin-bottom: 12px;
    }
    .color-preview-block {
      width: 100%;
      height: 48px;
      background: #ffffff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .color-preview-bar {
      width: 90%;
      height: 8px;
      background: #1e1e1e;
      border-radius: 4px;
      transition: background 0.15s;
    }

    /* 标签输入区域 */
    .tag-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .tag-suggestion {
      background: var(--bg-elevated);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    /* ========== 其他视图占位 ========== */
    #timelineView, #calendarView, #mindmapView, #blindboxView, #statsView {
      display: none;
    }
    .view-container {
      margin-top: 10px;
    }
    .batch-bar {
      background: var(--bg-surface);
      padding: 8px 16px;
      border-radius: 30px;
      margin-bottom: 15px;
      display: flex;
      gap: 15px;
      align-items: center;
      border: 1px solid var(--border-light);
    }
    .hidden {
      display: none !important;
    }
    .confirm-dialog {
      background: var(--bg-elevated);
      border-radius: 24px;
      padding: 24px;
      max-width: 400px;
      text-align: center;
      box-shadow: var(--shadow-lg);
      color: var(--text-primary);
    }

    /* 深色模式补充 */
    body.dark .color-preview-block {
      background: #2a2623;
    }
  </style>
</head>

<body>
<!-- 深色模式切换按钮 (右上角悬浮) -->
<div class="theme-toggle" id="themeToggle" title="切换深色/浅色模式">
  <span id="themeIcon">🌙</span>
  <span id="themeText">深色</span>
</div>

<div class="app">
  <div class="museum-header">
    <div>
      <h1>🏛️ 人生博物馆</h1>
      <div class="subhead">记录你的生命足迹，构建你的精神殿堂</div>
    </div>
  </div>

  <!-- 进度条 -->
  <div class="progress-section">
    <div class="progress-bar-container">
      <span class="progress-label">完成进度</span>
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <span class="progress-percent" id="progressPercent">0%</span>
    </div>
  </div>

  <!-- 今日灵感卡片 (独立小部件) -->
  <div class="inspiration-card" id="inspirationWidget">
    <div class="inspiration-content">
      <div class="inspiration-icon">💡</div>
      <div class="inspiration-text">
        <span class="inspiration-title">今日灵感</span>
        <span class="inspiration-desc" id="inspirationDesc">点击右侧按钮，随机探索未完成的心愿</span>
      </div>
    </div>
    <button class="inspiration-btn" id="refreshInspirationBtn">✨ 换一个</button>
  </div>

  <!-- 功能按钮栏 -->
  <div class="action-bar" id="functionBar">
    <button class="func-btn" data-view="list">📋 列表视图</button>
    <button class="func-btn" data-view="timeline">⏳ 时间轴</button>
    <button class="func-btn" data-view="calendar">📅 日历</button>
    <button class="func-btn" data-view="mindmap">🧠 事项导图</button>
    <button class="func-btn" data-view="blindbox">🎁 盲盒模式</button>
    <button class="func-btn" data-view="stats">📊 年度报告</button>
    <button class="func-btn" data-action="exportBio">🖨️ 打印传记</button>
    <button class="func-btn" data-action="exportMarkdown">📝 导出Markdown</button>
    <button class="func-btn" data-action="backup">💾 备份数据</button>
    <button class="func-btn" data-action="restore">📂 恢复数据</button>
    <button class="func-btn" data-action="toggleBatch">✂️ 批量删除</button>
    <button class="func-btn" data-view="capsuleReview">💊 胶囊回顾</button>
    <button class="func-btn" data-view="immersive">🌙 沉浸回顾</button>
    <button class="func-btn" id="birthdayBtn">🎂 生日设置</button>
  </div>

  <button class="add-btn" id="addItemBtn">➕ 添加清单</button>

  <!-- 批量操作栏 -->
  <div id="batchBar" class="batch-bar hidden">
    <span>批量操作：</span>
    <button id="selectAllBatch" class="func-btn">全选</button>
    <button id="invertSelectionBatch" class="func-btn">反选</button>
    <button id="deleteSelectedBatch" class="func-btn" style="color:#c24a3a;">删除选中</button>
    <button id="cancelBatch" class="func-btn">取消</button>
  </div>

  <!-- 排序及筛选控制栏 (列表视图显示) -->
  <div id="sortBar" class="sort-bar" style="display: none;">
    <label>📊 排序方式
      <select id="sortFieldSelect">
        <option value="title">事项名称</option>
        <option value="expectedAge">预计年龄</option>
        <option value="completedAge">完成年龄/时间</option>
      </select>
    </label>
    <button id="sortOrderBtn" class="sort-order-btn" title="切换升序/降序">⬆️ 升序</button>
    <label class="inline-check">
      <input type="checkbox" id="prioritizeHighlighted"> 🌟 优先高亮
    </label>
    <label>📋 状态
      <select id="statusFilterSelect">
        <option value="all">全部事项</option>
        <option value="uncompleted">仅未完成</option>
        <option value="completed">仅已完成</option>
      </select>
    </label>
  </div>

  <!-- 标签筛选条 (新增，列表视图显示) -->
  <div id="tagFilterBar" class="tag-filter-bar" style="display: none;">
    <span class="tag-filter-label">🏷️ 按标签筛选：</span>
    <div class="tag-cloud" id="tagCloudContainer">
      <span class="tag-filter-item active" data-tag="">全部</span>
    </div>
  </div>

  <!-- 主视图容器 -->
  <div id="mainView" class="view-container">
    <!-- 列表视图 -->
    <div id="listView" class="list-view">
      <div class="list-header">
        <div>✔️</div><div>事项</div><div>预计年龄</div><div>完成年龄</div><div>完成日期</div><div>耗时</div><div>备注</div><div>照片</div><div>颜色/标签</div><div></div>
      </div>
      <div id="listItemsContainer"></div>
    </div>

    <!-- 时间轴视图 -->
    <div id="timelineView" class="timeline-container"></div>

    <!-- 日历视图 -->
    <div id="calendarView"></div>

    <!-- 事项导图视图 -->
    <div id="mindmapView"></div>

    <!-- 盲盒视图 -->
    <div id="blindboxView"></div>

    <!-- 年度报告视图 (新增) -->
    <div id="statsView" style="background: var(--bg-surface); border-radius: 28px; padding: 24px;">
      <h3 style="margin-bottom: 20px;">📊 年度报告 · 生命数据</h3>
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px;">
        <div>

<!-- BGM 播放器将在 JS 中动态创建，此处无需静态结构 -->

<script>
(function(){
  "use strict";

  // ---------- 全局数据 ----------
  let lifeItems = [];
  let colorHistory = ['#1e1e1e', '#ffffff', '#2e4a3a', '#8b5a2b', '#b56532', '#6a8e7c'];
  let settings = {
    capsuleGlobalEnabled: false,
    autoPlayBgm: false,
    firstUploadBgm: true,
    birthday: null,
    defaultParentId: null,
    defaultFontColor: null,
    defaultBgColor: null,
    theme: 'light'
  };
  let currentView = 'list';
  let batchMode = false;
  let selectedIds = new Set();
  let pendingCompleteItemId = null;
  let pendingCapsuleItemId = null;
  const STORAGE_KEY = 'life_museum_data',
        COLOR_HISTORY_KEY = 'museum_color_history',
        SETTINGS_KEY = 'museum_settings';

  let tagFilter = '';
  let allTags = new Set();

  let saveDataTimer = null;
  function debouncedSaveData() {
    if (saveDataTimer) clearTimeout(saveDataTimer);
    saveDataTimer = setTimeout(() => {
      saveData();
      saveDataTimer = null;
    }, 200);
  }

  function loadData() {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) { try { lifeItems = JSON.parse(stored); } catch(e) { lifeItems = []; } }
    else { lifeItems = []; }
    const ch = localStorage.getItem(COLOR_HISTORY_KEY);
    if (ch) { try { colorHistory = JSON.parse(ch); } catch(e) {} }
    const s = localStorage.getItem(SETTINGS_KEY);
    if (s) { try { settings = JSON.parse(s); } catch(e) {} }
    applyTheme(settings.theme || 'light');
    rebuildTagSet();
  }

  function rebuildTagSet() {
    allTags.clear();
    lifeItems.forEach(item => {
      if (item.tags && Array.isArray(item.tags)) {
        item.tags.forEach(t => allTags.add(t));
      }
    });
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(lifeItems));
    localStorage.setItem(COLOR_HISTORY_KEY, JSON.stringify(colorHistory));
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
    rebuildTagSet();
    updateProgress();
    renderCurrentView();
    updateTagFilterBar();
    updateInspirationWidget();
  }

  function updateProgress() {
    const total = lifeItems.length,
          completed = lifeItems.filter(i => i.completed).length;
    const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
    document.getElementById('progressFill').style.width = percent + '%';
    document.getElementById('progressPercent').innerText = percent + '%';
  }

  function renderCurrentView() {
    if (currentView === 'list') renderListView();
    else if (currentView === 'timeline') renderTimelineView();
    else if (currentView === 'calendar') renderCalendarView();
    else if (currentView === 'mindmap') renderMindmapView();
    else if (currentView === 'blindbox') renderBlindboxView();
    else if (currentView === 'stats') renderStatsView();
  }

  function applyTheme(theme) {
    settings.theme = theme;
    if (theme === 'dark') {
      document.body.classList.add('dark');
      document.getElementById('themeIcon').textContent = '☀️';
      document.getElementById('themeText').textContent = '浅色';
    } else {
      document.body.classList.remove('dark');
      document.getElementById('themeIcon').textContent = '🌙';
      document.getElementById('themeText').textContent = '深色';
    }
  }

  document.getElementById('themeToggle').addEventListener('click', () => {
    const newTheme = settings.theme === 'light' ? 'dark' : 'light';
    applyTheme(newTheme);
    saveData();
  });

  function updateInspirationWidget() {
    const uncompleted = lifeItems.filter(i => !i.completed);
    const descSpan = document.getElementById('inspirationDesc');
    if (uncompleted.length === 0) {
      descSpan.textContent = '太棒了！所有事项都已完成 ✨';
      return;
    }
    const randomItem = uncompleted[Math.floor(Math.random() * uncompleted.length)];
    descSpan.textContent = randomItem.title;
  }

  document.getElementById('refreshInspirationBtn').addEventListener('click', updateInspirationWidget);

  function updateTagFilterBar() {
    const container = document.getElementById('tagCloudContainer');
    const activeTag = tagFilter || '';
    let html = `<span class="tag-filter-item ${activeTag === '' ? 'active' : ''}" data-tag="">全部</span>`;
    const sortedTags = Array.from(allTags).sort();
    sortedTags.forEach(tag => {
      html += `<span class="tag-filter-item ${activeTag === tag ? 'active' : ''}" data-tag="${escapeHtml(tag)}">${escapeHtml(tag)}</span>`;
    });
    container.innerHTML = html;
    container.querySelectorAll('.tag-filter-item').forEach(el => {
      el.addEventListener('click', () => {
        tagFilter = el.dataset.tag;
        renderListView();
        updateTagFilterBar();
      });
    });
  }

  function toggleTagFilterBar(show) {
    const bar = document.getElementById('tagFilterBar');
    if (bar) bar.style.display = show ? 'flex' : 'none';
  }

  function escapeHtml(text) {
    if (!text) return text;
    return String(text).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]);
  }

  function addColorToHistory(color) {
    if (!color) return;
    colorHistory = [color, ...colorHistory.filter(c => c !== color)].slice(0, 12);
  }

  function updateItemColor(id, type, value) {
    const item = lifeItems.find(i => i.id === id);
    if (!item) return;
    if (type === 'font') item.fontColor = value;
    else item.bgColor = value;
    debouncedSaveData();
  }

  function calculateAgeFromBirthday(birthday, finishDate) {
    if (!birthday || !finishDate) return null;
    const birth = new Date(birthday);
    const finish = new Date(finishDate);
    if (isNaN(birth) || isNaN(finish)) return null;
    let age = finish.getFullYear() - birth.getFullYear();
    const m = finish.getMonth() - birth.getMonth();
    if (m < 0 || (m === 0 && finish.getDate() < birth.getDate())) age--;
    return age;
  }

  function getExpectedAgeValue(item) {
    const ageStr = item.expectedAge || '';
    const match = ageStr.match(/^(\d+)/);
    return match ? parseInt(match[1], 10) : 0;
  }

  function getCompletedAgeValue(item) {
    const age = item.completedAge;
    if (age && !isNaN(parseInt(age, 10))) return parseInt(age, 10);
    return 0;
  }

  function getFinishDateValue(item) {
    const dateStr = item.finishDate;
    if (!dateStr) return 0;
    const parts = dateStr.split('-');
    let val = 0;
    if (parts[0]) val += parseInt(parts[0], 10) * 10000;
    if (parts[1]) val += parseInt(parts[1], 10) * 100;
    if (parts[2]) val += parseInt(parts[2], 10);
    return val;
  }

  function getCompletedSortValue(item) {
    const ageVal = getCompletedAgeValue(item);
    if (ageVal > 0) return ageVal;
    return getFinishDateValue(item);
  }

  let sortField = 'title';
  let sortAscending = true;
  let prioritizeHighlighted = false;
  let statusFilter = 'all';

  function getFilteredAndSortedItems() {
    let items = lifeItems.filter(item => {
      if (statusFilter === 'completed' && !item.completed) return false;
      if (statusFilter === 'uncompleted' && item.completed) return false;
      if (tagFilter && (!item.tags || !item.tags.includes(tagFilter))) return false;
      return true;
    });

    if (prioritizeHighlighted) {
      const defaultBg = settings.defaultBgColor || '#ffffff';
      items.sort((a, b) => {
        const aH = a.bgColor && a.bgColor !== defaultBg;
        const bH = b.bgColor && b.bgColor !== defaultBg;
        if (aH && !bH) return -1;
        if (!aH && bH) return 1;
        return 0;
      });
    }

    items.sort((a, b) => {
      let valA, valB;
      if (sortField === 'title') {
        valA = (a.title || '').toLowerCase();
        valB = (b.title || '').toLowerCase();
        const result = valA.localeCompare(valB, 'zh-CN');
        return sortAscending ? result : -result;
      }
      if (sortField === 'expectedAge') {
        valA = getExpectedAgeValue(a);
        valB = getExpectedAgeValue(b);
      } else {
        valA = getCompletedSortValue(a);
        valB = getCompletedSortValue(b);
      }
      return sortAscending ? valA - valB : valB - valA;
    });

    return items;
  }

  function renderListView() {
    const container = document.getElementById('listItemsContainer');
    if (!container) return;

    const filteredItems = getFilteredAndSortedItems();

    if (filteredItems.length === 0) {
      container.innerHTML = '<div class="empty-message">✨ 还没有任何人生清单，点击「添加清单」开始记录吧 ✨</div>';
      return;
    }

    let html = '';
    filteredItems.forEach(item => {
      const completedClass = item.completed ? 'completed-item' : '';
      const itemStyle = `color: ${item.fontColor || '#1e1e1e'};`;
      const titleBgStyle = `background: ${item.bgColor || 'transparent'}; padding: 4px 6px; border-radius: 8px;`;
      const batchCheck = batchMode ? `<input type="checkbox" class="batch-check" data-id="${item.id}" ${selectedIds.has(item.id) ? 'checked' : ''}>` : '';

      let tagsHtml = '';
      if (item.tags && item.tags.length) {
        tagsHtml = '<span class="item-tags">' + item.tags.map(t => `<span class="tag-badge" data-tag="${escapeHtml(t)}">${escapeHtml(t)}</span>`).join('') + '</span>';
      }

      const canViewCapsule = item.capsuleEnabled && item.capsuleMsg && item.capsuleVisibleAfter && new Date(item.capsuleVisibleAfter) <= new Date();
      const capsuleIcon = canViewCapsule ? '<span style="margin-left:6px;cursor:pointer;" class="capsule-indicator" data-id="' + item.id + '">🔓</span>' : '';

      html += `<div class="list-item ${completedClass}" data-id="${item.id}" style="background: ${item.bgColor || 'transparent'}; ${itemStyle}">`;
      html += `<div class="item-check">${batchMode ? batchCheck : `<input type="checkbox" ${item.completed ? 'checked' : ''} data-id="${item.id}" class="item-checkbox">`}</div>`;
      html += `<div class="item-title" style="${titleBgStyle}" data-id="${item.id}">${escapeHtml(item.title) || '未命名'}${capsuleIcon}${tagsHtml}</div>`;
      html += `<div>${item.expectedAge || '-'}</div>`;
      html += `<div>${item.completedAge || '-'}</div>`;
      html += `<div>${item.finishDate || '-'}</div>`;
      html += `<div>${item.duration || '-'}</div>`;
      html += `<div>${escapeHtml(item.notes) || '-'}</div>`;
      html += `<div>${item.photo ? '📷' : '—'}</div>`;
      html += `<div class="color-picker-group"><input type="color" class="font-color-picker" value="${item.fontColor || '#1e1e1e'}" data-id="${item.id}" data-type="font" title="字体颜色"><input type="color" class="bg-color-picker" value="${item.bgColor || '#ffffff'}" data-id="${item.id}" data-type="bg" title="背景色"><div class="history-colors" data-id="${item.id}"></div>`;
      html += `<button class="share-card-btn func-btn" style="padding:2px 6px; margin-left:4px;" data-id="${item.id}" title="生成分享卡片">📤</button></div>`;
      html += `<div><button class="delete-btn" data-id="${item.id}">🗑️</button></div></div>`;
    });
    container.innerHTML = html;

    document.querySelectorAll('.history-colors').forEach(el => {
      const id = el.dataset.id;
      colorHistory.slice(0,5).forEach(col => {
        const dot = document.createElement('span');
        dot.className = 'history-dot';
        dot.style.backgroundColor = col;
        dot.title = col;
        dot.addEventListener('click', e => {
          e.stopPropagation();
          const picker = document.querySelector(`.font-color-picker[data-id="${id}"]`);
          if(picker) { picker.value = col; updateItemColor(id, 'font', col); }
        });
        el.appendChild(dot);
      });
    });

    if (!batchMode) {
      document.querySelectorAll('.item-checkbox').forEach(cb => cb.addEventListener('change', e => {
        const id = e.target.dataset.id;
        const item = lifeItems.find(i => i.id === id);
        if (!item) return;
        if (cb.checked) {
          if (!item.finishDate || !item.duration) {
            e.preventDefault();
            cb.checked = false;
            pendingCompleteItemId = id;
            showCompleteConfirmDialog(item);
            return;
          }
          item.completed = true;
          if (item.capsuleEnabled) triggerCapsulePopup(item);
        } else {
          item.completed = false;
        }
        debouncedSaveData();
      }));
    } else {
      document.querySelectorAll('.batch-check').forEach(cb => cb.addEventListener('change', e => {
        const id = e.target.dataset.id;
        cb.checked ? selectedIds.add(id) : selectedIds.delete(id);
      }));
    }

    document.querySelectorAll('.item-title').forEach(el => el.addEventListener('click', e => {
      if (e.target.classList.contains('tag-badge') || e.target.classList.contains('capsule-indicator')) return;
      openEditModal(e.currentTarget.dataset.id);
    }));
    document.querySelectorAll('.tag-badge').forEach(el => el.addEventListener('click', e => {
      e.stopPropagation();
      tagFilter = e.target.dataset.tag;
      renderListView();
      updateTagFilterBar();
    }));
    document.querySelectorAll('.capsule-indicator').forEach(el => el.addEventListener('click', e => {
      e.stopPropagation();
      const item = lifeItems.find(i => i.id === el.dataset.id);
      if (item) alert(`💬 时光胶囊寄语：\n“${item.capsuleMsg}”`);
    }));
    document.querySelectorAll('.font-color-picker').forEach(p => {
      p.addEventListener('input', e => updateItemColor(e.target.dataset.id, 'font', e.target.value));
      p.addEventListener('change', e => addColorToHistory(e.target.value));
    });
    document.querySelectorAll('.bg-color-picker').forEach(p => {
      p.addEventListener('input', e => updateItemColor(e.target.dataset.id, 'bg', e.target.value));
      p.addEventListener('change', e => addColorToHistory(e.target.value));
    });
    document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', e => {
      if(confirm('确定删除这项清单吗？')) {
        lifeItems = lifeItems.filter(i => i.id !== e.target.dataset.id);
        debouncedSaveData();
      }
    }));
    document.querySelectorAll('.share-card-btn').forEach(btn => btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = btn.dataset.id;
      const item = lifeItems.find(i => i.id === id);
      if (item) generateShareCard(item);
    }));
  }

  function generateShareCard(item) {
    const canvas = document.getElementById('shareCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600;
    canvas.height = 400;

    const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    gradient.addColorStop(0, '#f5f3f0');
    gradient.addColorStop(1, '#e2d9d0');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.font = 'bold 28px system-ui, "Segoe UI", sans-serif';
    ctx.fillStyle = '#3a2c1f';
    ctx.fillText(item.title, 40, 80);

    ctx.font = '18px system-ui, sans-serif';
    ctx.fillStyle = '#5f4e3e';
    ctx.fillText(`完成于 ${item.finishDate || '未知'}  |  耗时 ${item.duration || '未知'}`, 40, 130);

    if (item.notes) {
      ctx.font = '16px system-ui, serif';
      ctx.fillStyle = '#4e3e30';
      wrapText(ctx, item.notes, 40, 180, 520, 24);
    }

    if (item.photo) {
      const img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = () => {
        const maxW = 200, maxH = 150;
        let w = img.width, h = img.height;
        if (w > maxW) { h = (maxW / w) * h; w = maxW; }
        if (h > maxH) { w = (maxH / h) * w; h = maxH; }
        ctx.drawImage(img, 40, 250, w, h);
        downloadCard(canvas);
      };
      img.src = item.photo;
    } else {
      downloadCard(canvas);
    }
  }

  function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
    const words = text.split('');
    let line = '';
    for (let n = 0; n < words.length; n++) {
      const testLine = line + words[n];
      const metrics = ctx.measureText(testLine);
      if (metrics.width > maxWidth && n > 0) {
        ctx.fillText(line, x, y);
        line = words[n];
        y += lineHeight;
      } else {
        line = testLine;
      }
    }
    ctx.fillText(line, x, y);
  }

  function downloadCard(canvas) {
    const link = document.createElement('a');
    link.download = `museum_share_${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  }

  function showCompleteConfirmDialog(item) {
    const msg = `事项"${item.title}"缺少${!item.finishDate ? '完成日期' : ''}${!item.finishDate && !item.duration ? '和' : ''}${!item.duration ? '耗时' : ''}，是否现在添加？`;
    document.getElementById('confirmMessage').innerText = msg;
    document.getElementById('completeConfirmDialog').classList.remove('hidden');
  }

  function triggerCapsulePopup(item) {
    pendingCapsuleItemId = item.id;
    document.getElementById('capsulePopup').classList.remove('hidden');
  }

  function openEditModal(id) {
    const item = id ? lifeItems.find(i => i.id === id) : null;
    const modalBody = document.getElementById('modalBody');
    if (modalBody) modalBody.scrollTop = 0;

    const fontColorInput = document.getElementById('editFontColor');
    const bgColorInput = document.getElementById('editBgColor');

  // 时间轴视图 (完整实现)
  let canvas, ctx;
  function renderTimelineView() {
    const container = document.getElementById('timelineView');
    container.innerHTML = `
      <h3 style="margin-bottom:15px;">⏳ 人生时间轴</h3>
      <div style="margin-bottom:10px;">
        <button id="timelineZoomIn" class="func-btn">➕ 放大</button>
        <button id="timelineZoomOut" class="func-btn">➖ 缩小</button>
        <button id="timelineReset" class="func-btn">🔄 重置</button>
        <span style="margin-left:15px;">滚轮缩放，拖拽平移，悬停查看详情</span>
      </div>
      <div style="position:relative; background:var(--bg-surface); border-radius:20px; padding:20px;">
        <canvas id="timelineCanvas" width="1000" height="250" style="width:100%; height:auto; border-radius:12px;"></canvas>
        <div id="timelineTooltip" style="position:absolute; background:var(--bg-elevated); border:1px solid var(--border-light); border-radius:12px; padding:8px 14px; box-shadow:var(--shadow-lg); pointer-events:none; display:none; max-width:250px; color:var(--text-primary);"></div>
      </div>
    `;
    canvas = document.getElementById('timelineCanvas');
    ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('timelineTooltip');

    let scale = 1.0;
    const minScale = 0.5, maxScale = 4.0;
    let timelineOffsetX = 0;
    const maxAgeLimit = 100;

    function getAgeFromBirthday() {
      if (!settings.birthday) return null;
      const birth = new Date(settings.birthday);
      const now = new Date();
      let age = now.getFullYear() - birth.getFullYear();
      const m = now.getMonth() - birth.getMonth();
      if (m < 0 || (m === 0 && now.getDate() < birth.getDate())) age--;
      return age;
    }

    function drawTimeline() {
      const w = 1000, h = 250;
      canvas.width = w; canvas.height = h;
      ctx.clearRect(0, 0, w, h);
      const startX = 60, y = 130;
      const baseAgeWidth = (w - startX - 20) / maxAgeLimit;
      const ageWidth = baseAgeWidth * scale;
      const maxVisibleAge = Math.min(maxAgeLimit, Math.ceil((w - startX - timelineOffsetX) / ageWidth) + 5);

      ctx.beginPath();
      ctx.moveTo(startX, y);
      ctx.lineTo(w, y);
      ctx.strokeStyle = 'var(--accent-soft)';
      ctx.lineWidth = 2;
      ctx.stroke();

      ctx.beginPath();
      ctx.arc(startX, y, 6, 0, 2 * Math.PI);
      ctx.fillStyle = 'var(--accent-primary)';
      ctx.fill();
      ctx.fillStyle = 'var(--text-primary)';
      ctx.font = 'bold 11px sans-serif';
      ctx.fillText('0', startX - 10, y - 15);

      let step, labelFunc;
      if (scale < 1.2) { step = 10; labelFunc = (age) => age + '+'; }
      else { step = 1; labelFunc = (age) => age; }

      for (let age = 0; age <= maxVisibleAge; age += step) {
        const x = startX + age * ageWidth + timelineOffsetX;
        if (x > w + 30) continue;
        if (x < startX - 30 && age > 0) continue;
        ctx.fillStyle = 'var(--text-primary)';
        ctx.font = scale > 2.0 ? '11px sans-serif' : '12px sans-serif';
        ctx.fillText(labelFunc(age), x - 10, y - 15);
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, 2 * Math.PI);
        ctx.fillStyle = 'var(--text-secondary)';
        ctx.fill();
      }

      lifeItems.filter(i => i.completed && i.completedAge).forEach(item => {
        const age = parseInt(item.completedAge);
        if (isNaN(age) || age < 0 || age > maxAgeLimit) return;
        const x = startX + age * ageWidth + timelineOffsetX;
        if (x < startX - 20 || x > w + 20) return;
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, 2 * Math.PI);
        ctx.fillStyle = 'var(--accent-success)';
        ctx.fill();
        ctx.fillStyle = 'white';
        ctx.font = 'bold 12px sans-serif';
        ctx.fillText('✓', x - 5, y + 5);
      });

      const currentAge = getAgeFromBirthday();
      if (currentAge !== null && currentAge >= 0 && currentAge <= maxAgeLimit) {
        const x = startX + currentAge * ageWidth + timelineOffsetX;
        if (x >= startX - 10 && x <= w + 10) {
          ctx.beginPath();
          ctx.arc(x, y, 7, 0, 2 * Math.PI);
          ctx.fillStyle = 'var(--accent-warm)';
          ctx.fill();
          ctx.fillStyle = 'white';
          ctx.font = 'bold 10px sans-serif';
          ctx.fillText('现在', x - 15, y - 20);
        }
      }

      canvas.onmousemove = (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleXVal = canvas.width / rect.width;
        const mouseX = (e.clientX - rect.left) * scaleXVal;
        const mouseY = (e.clientY - rect.top) * (canvas.height / rect.height);
        let foundAge = null;
        const hoverStep = (scale < 1.2) ? 10 : 1;
        for (let age = 0; age <= maxVisibleAge; age += hoverStep) {
          const x = startX + age * ageWidth + timelineOffsetX;
          const dx = mouseX - x, dy = mouseY - y;
          if (Math.sqrt(dx*dx + dy*dy) < 25) { foundAge = age; break; }
        }
        if (foundAge !== null) {
          let items;
          if (scale < 1.2) {
            const minAge = foundAge, maxAgeRange = foundAge + 9;
            items = lifeItems.filter(i => i.completed && i.completedAge && parseInt(i.completedAge) >= minAge && parseInt(i.completedAge) <= maxAgeRange);
          } else {
            items = lifeItems.filter(i => i.completed && i.completedAge && parseInt(i.completedAge) === foundAge);
          }
          if (items.length) {
            tooltip.style.display = 'block';
            tooltip.style.left = (e.clientX - rect.left + 20) + 'px';
            tooltip.style.top = (e.clientY - rect.top - 30) + 'px';
            tooltip.innerHTML = `<strong>${scale<1.2 ? foundAge+'+' : foundAge}岁完成：</strong><br>` + items.map(i => `• ${i.title}`).join('<br>');
          } else { tooltip.style.display = 'none'; }
        } else { tooltip.style.display = 'none'; }
      };
      canvas.onmouseleave = () => tooltip.style.display = 'none';
    }

    drawTimeline();

    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? -0.1 : 0.1;
      scale = Math.max(minScale, Math.min(maxScale, scale + delta));
      drawTimeline();
    });
    document.getElementById('timelineZoomIn').onclick = () => { scale = Math.min(maxScale, scale + 0.2); drawTimeline(); };
    document.getElementById('timelineZoomOut').onclick = () => { scale = Math.max(minScale, scale - 0.2); drawTimeline(); };
    document.getElementById('timelineReset').onclick = () => { scale = 1.0; timelineOffsetX = 0; drawTimeline(); };

    let isDragging = false, lastX;
    canvas.addEventListener('mousedown', (e) => { isDragging = true; lastX = e.clientX; canvas.style.cursor = 'grabbing'; });
    window.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      timelineOffsetX += dx;
      const startX = 60;
      const ageWidth = ((1000 - startX - 20) / maxAgeLimit) * scale;
      const minOffset = -startX + 10;
      const maxOffset = 500;
      timelineOffsetX = Math.max(minOffset, Math.min(maxOffset, timelineOffsetX));
      lastX = e.clientX;
      drawTimeline();
    });
    window.addEventListener('mouseup', () => { isDragging = false; canvas.style.cursor = 'default'; });
  }


  // ========== 日历视图 ==========
  let calendarMode = 'range', displayYear = new Date().getFullYear(), displayMonth = new Date().getMonth() + 1, rangeStart = displayYear - 2, rangeEnd = displayYear + 2;
  function renderCalendarView() {
    const container = document.getElementById('calendarView');
    container.innerHTML = `<div style="display:flex; gap:20px; align-items:center; margin-bottom:20px;"><h3>📅 日历视图</h3><select id="calendarModeSelect" class="func-btn"><option value="range" ${calendarMode==='range'?'selected':''}>年份区间</option><option value="year" ${calendarMode==='year'?'selected':''}>年视图</option><option value="month" ${calendarMode==='month'?'selected':''}>月视图</option></select><div id="calendarControls"></div></div><div id="calendarContent" style="background:var(--bg-surface); border-radius:20px; padding:20px;"></div>`;
    document.getElementById('calendarModeSelect').addEventListener('change', (e) => { calendarMode = e.target.value; if (calendarMode === 'year') displayYear = new Date().getFullYear(); renderCalendarView(); });
    renderCalendarContent();
  }
  function renderCalendarContent() {
    const controlsDiv = document.getElementById('calendarControls');
    if (calendarMode === 'month') {
      controlsDiv.innerHTML = `<button id="prevMonthBtn" class="func-btn">◀</button><span style="margin:0 15px; font-weight:600;">${displayYear}年${displayMonth}月</span><button id="nextMonthBtn" class="func-btn">▶</button>`;
      renderMonthView(displayYear, displayMonth);
      document.getElementById('prevMonthBtn').onclick = () => { displayMonth--; if(displayMonth<1){ displayMonth=12; displayYear--; } renderCalendarView(); };
      document.getElementById('nextMonthBtn').onclick = () => { displayMonth++; if(displayMonth>12){ displayMonth=1; displayYear++; } renderCalendarView(); };
    } else if (calendarMode === 'year') {
      controlsDiv.innerHTML = `<button id="prevYearBtn" class="func-btn">◀</button><span style="margin:0 15px; font-weight:600;">${displayYear}年</span><button id="nextYearBtn" class="func-btn">▶</button>`;
      renderYearView(displayYear);
      document.getElementById('prevYearBtn').onclick = () => { displayYear--; renderCalendarView(); };
      document.getElementById('nextYearBtn').onclick = () => { displayYear++; renderCalendarView(); };
    } else if (calendarMode === 'range') {
      controlsDiv.innerHTML = `起始年 <input type="number" id="rangeStartInput" value="${rangeStart}" style="width:80px;"> 结束年 <input type="number" id="rangeEndInput" value="${rangeEnd}" style="width:80px;"> <button id="applyRangeBtn" class="func-btn">应用</button> <select id="rangePreset" class="func-btn"><option value="5">近5年</option><option value="10">近10年</option><option value="all">全部</option></select>`;
      renderRangeView(rangeStart, rangeEnd);
      document.getElementById('applyRangeBtn').onclick = () => { rangeStart = parseInt(document.getElementById('rangeStartInput').value); rangeEnd = parseInt(document.getElementById('rangeEndInput').value); renderCalendarView(); };

  function getCompletedCountByDate(datePrefix) { return lifeItems.filter(i => i.completed && i.finishDate && i.finishDate.startsWith(datePrefix)).length; }
  function renderMonthView(year, month) {
    const firstDay = new Date(year, month-1, 1).getDay(), daysInMonth = new Date(year, month, 0).getDate();
    let html = `<div style="display:grid; grid-template-columns:repeat(7,1fr); gap:10px;">`;
    ['日','一','二','三','四','五','六'].forEach(d => html += `<div style="text-align:center; font-weight:600;">${d}</div>`);
    for (let i=0; i<firstDay; i++) html += `<div></div>`;
    for (let d=1; d<=daysInMonth; d++) {
      const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const items = lifeItems.filter(i => i.completed && i.finishDate && i.finishDate.startsWith(dateStr)).sort((a,b) => (a.finishDate||'').localeCompare(b.finishDate||''));
      const count = items.length;
      const hasEvent = count > 0;
      const titles = items.map(i => `• ${i.title} (${i.finishDate})`).join('\n');
      html += `<div style="background:${hasEvent?'#b5c9b2':'var(--bg-elevated)'}; border-radius:12px; padding:10px; text-align:center; border:1px solid var(--border-light);" title="${hasEvent?titles:''}"><div style="font-size:1.1rem;">${d}</div>${hasEvent?`<div style="font-size:0.75rem; color:var(--accent-success);">${count}</div>`:''}</div>`;

      const year = item.finishDate.split('-')[0];
      if (year) yearCounts[year] = (yearCounts[year] || 0) + 1;

    const years = Object.keys(yearCounts).sort();

    const canvas = document.getElementById('yearlyChart');

      const ctx = canvas.getContext('2d');

        data: {
          labels: years,
          datasets: [{
            label: '完成事项数',

            backgroundColor: 'var(--accent-success)',
            borderRadius: 8
          }]

        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { labels: { color: 'var(--text-primary)' } }
          },
          scales: {
            x: { ticks: { color: 'var(--text-secondary)' }, grid: { color: 'var(--border-light)' } },

  function getTopTags(n) {

      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          lifeItems = data.lifeItems || [];
          colorHistory = data.colorHistory || [];
          settings = data.settings || {};
          applyTheme(settings.theme || 'light');
          saveData();
          alert('数据恢复成功');
          renderCurrentView();
        } catch(ex) { alert('无效的备份文件'); }
      };
      reader.readAsText(file);

          <h2 style="font-size:2.5rem; margin-bottom:20px; color:#e6d5c3;">${escapeHtml(item.title)}</h2>
          ${item.photo ? `<img src="${item.photo}" style="max-width:100%; max-height:300px; border-radius:20px; margin:20px 0;">` : ''}
          <p style="font-size:1.2rem;">📅 ${item.finishDate || '未知日期'}  ⏱️ ${item.duration || '未知耗时'}</p>
          <p style="font-style:italic; margin:25px 0;">${escapeHtml(item.notes) || ''}</p>
          ${item.capsuleEnabled && item.capsuleMsg ? `<div style="background:#3e332a; border-radius:24px; padding:20px; margin-top:20px;"><p style="opacity:0.8;">💬 时光胶囊寄语</p><p style="font-size:1.2rem;">“${escapeHtml(item.capsuleMsg)}”</p></div>` : ''}
          <div style="margin-top:30px;">
            <div style="display:flex; gap:15px; justify-content:center;">
              <button id="prevImmersiveBtn" class="func-btn" style="background:transparent; color:#e6d5c3;" ${index===0?'disabled':''}>◀</button>
              <button id="playPauseImmersiveBtn" class="func-btn" style="background:transparent; color:#e6d5c3;">${isPlaying?'⏸️':'▶️'}</button>
              <button id="nextImmersiveBtn" class="func-btn" style="background:transparent; color:#e6d5c3;" ${index===completed.length-1?'disabled':''}>▶</button>
            </div>
            <div style="margin-top:15px; height:4px; background:#4a3e36; border-radius:2px;">
              <div id="immersiveProgress" style="width:${((index+1)/completed.length)*100}%; height:100%; background:#b5c9b2; border-radius:2px; transition:width 0.3s;"></div>
            </div>
            <p style="margin-top:8px;">${index+1} / ${completed.length}</p>
            <button id="closeImmersiveBtn" class="func-btn" style="margin-top:20px; background:#4f3a2b; color:white;">关闭回顾</button>
          </div>
        </div>
      `;
      bindImmersiveControls();
      if (isPlaying) startAutoPlay();
    }
    function bindImmersiveControls() {
      document.getElementById('prevImmersiveBtn')?.addEventListener('click', () => { if (currentIdx > 0) { currentIdx--; renderItem(currentIdx); } });
      document.getElementById('nextImmersiveBtn')?.addEventListener('click', () => { if (currentIdx < completed.length - 1) { currentIdx++; renderItem(currentIdx); } });
      document.getElementById('playPauseImmersiveBtn')?.addEventListener('click', toggleAutoPlay);
      document.getElementById('closeImmersiveBtn')?.addEventListener('click', () => { stopAutoPlay(); overlay.remove(); if (window.bgmAudio) window.bgmAudio.pause(); });
    }
    function startAutoPlay() {
      stopAutoPlay();
      autoTimer = setInterval(() => {
        if (currentIdx < completed.length - 1) { currentIdx++; renderItem(currentIdx); }
        else { stopAutoPlay(); isPlaying = false; renderItem(currentIdx); }
      }, 3000);
    }
    function stopAutoPlay() { if (autoTimer) clearInterval(autoTimer); }
    function toggleAutoPlay() { isPlaying = !isPlaying; if (isPlaying) startAutoPlay(); else stopAutoPlay(); renderItem(currentIdx); }

    renderItem(0); document.body.appendChild(overlay);
    if (settings.autoPlayBgm && window.bgmAudio) { window.bgmAudio.play().catch(e => {}); }
    const keyHandler = (e) => {
      if (e.key === 'ArrowLeft' && currentIdx > 0) { currentIdx--; renderItem(currentIdx); }
      else if (e.key === 'ArrowRight' && currentIdx < completed.length - 1) { currentIdx++; renderItem(currentIdx); }
      else if (e.key === 'Escape') { overlay.remove(); stopAutoPlay(); if (window.bgmAudio) window.bgmAudio.pause(); window.removeEventListener('keydown', keyHandler); }
    };
    window.addEventListener('keydown', keyHandler);
    overlay.addEventListener('dblclick', () => { overlay.remove(); stopAutoPlay(); if (window.bgmAudio) window.bgmAudio.pause(); window.removeEventListener('keydown', keyHandler); });
  }

  // 胶囊回顾弹窗
  let capsuleModalActive = false;
  function renderCapsuleReviewModal() {
    if (capsuleModalActive) return;
    const unlockedItems = lifeItems.filter(i => i.completed && i.capsuleEnabled && i.capsuleMsg && i.capsuleVisibleAfter && new Date(i.capsuleVisibleAfter) <= new Date());
    if (unlockedItems.length === 0) { alert('📭 还没有解锁的时光胶囊。完成事项并等待一年后再来看看吧！'); return; }
    capsuleModalActive = true;
    const modal = document.createElement('div');
    modal.className = 'modal'; modal.style.display = 'flex';
    modal.innerHTML = `<div class="modal-content" style="max-width:600px;"><h2>💊 时光胶囊回顾</h2><p style="margin-bottom:20px;">这些是你完成事项时写给自己的寄语，现在已解锁：</p><div style="max-height:400px; overflow-y:auto;">${unlockedItems.map(item => `<div style="background:var(--bg-elevated); border-radius:16px; padding:16px; margin-bottom:12px;"><div style="font-weight:600; margin-bottom:8px;">✨ ${escapeHtml(item.title)}</div><div style="font-style:italic; color:var(--text-secondary);">“${escapeHtml(item.capsuleMsg)}”</div><div style="font-size:0.8rem; margin-top:8px; color:var(--text-muted);">完成于 ${item.finishDate || '未知日期'}</div></div>`).join('')}</div><button id="closeCapsuleReviewBtn" class="func-btn" style="margin-top:20px; width:100%;">关闭</button></div>`;
    document.body.appendChild(modal);
    const closeHandler = () => { modal.remove(); capsuleModalActive = false; };
    modal.addEventListener('click', (e) => { if (e.target === modal || e.target.id === 'closeCapsuleReviewBtn') closeHandler(); });
  }

  // 扩展 switchView 以支持胶囊回顾和沉浸回顾
  const originalSwitchView = switchView;
  switchView = function(view) {
    if (view === 'immersive') { renderImmersiveReview(); return; }
    if (view === 'capsuleReview') { renderCapsuleReviewModal(); return; }
    originalSwitchView(view);
  };

  // BGM 播放器
  function initBgmPlayer() {
    const playerHtml = `<div id="bgmPlayer" style="position:fixed; bottom:20px; right:25px; background:var(--bg-elevated); backdrop-filter:blur(12px); padding:10px 16px; border-radius:50px; box-shadow:var(--shadow-lg); display:flex; align-items:center; gap:14px; border:1px solid var(--border-light); z-index:999; color:var(--text-primary);"><span>🎵</span><audio id="bgmAudio" loop></audio><button id="playPauseBgm">▶️</button><input type="file" id="bgmUpload" accept="audio/*" title="上传音乐"><span id="bgmFileName">未选择</span><button id="stopBgm">⏹️</button><label><input type="checkbox" id="autoPlayBgm">自动播放</label></div>`;
    document.body.insertAdjacentHTML('beforeend', playerHtml);
    const audio = document.getElementById('bgmAudio'), playBtn = document.getElementById('playPauseBgm'), stopBtn = document.getElementById('stopBgm'), upload = document.getElementById('bgmUpload'), fileNameSpan = document.getElementById('bgmFileName'), autoPlayChk = document.getElementById('autoPlayBgm');
    autoPlayChk.checked = settings.autoPlayBgm;
    autoPlayChk.addEventListener('change', () => settings.autoPlayBgm = autoPlayChk.checked);
    upload.addEventListener('change', e => {
      const file = e.target.files[0]; if(!file) return;
      audio.src = URL.createObjectURL(file); fileNameSpan.textContent = file.name;
      if(settings.autoPlayBgm) audio.play();
    });
    playBtn.addEventListener('click', () => {
      if(!audio.src) { alert('请先上传音乐'); return; }
      audio.paused ? audio.play() : audio.pause(); playBtn.textContent = audio.paused ? '▶️' : '⏸️';
    });
    stopBtn.addEventListener('click', () => { audio.pause(); audio.currentTime = 0; playBtn.textContent = '▶️'; });
    audio.addEventListener('play', () => playBtn.textContent = '⏸️'); audio.addEventListener('pause', () => playBtn.textContent = '▶️');
    return audio;
  }
  window.bgmAudio = initBgmPlayer();

  // 照片压缩上传
  window.tempPhotoData = null;
  document.getElementById('editPhoto').addEventListener('change', (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas'); const maxW = 800;
        let w = img.width, h = img.height;
        if (w > maxW) { h = (maxW / w) * h; w = maxW; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d'); ctx.drawImage(img, 0, 0, w, h);
        window.tempPhotoData = canvas.toDataURL('image/jpeg', 0.8);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

  // 启动
  loadData();
  updateProgress();
  renderListView();
  toggleSortBar(currentView === 'list');
  updateInspirationWidget();
  updateTagFilterBar();
  updateSortUI();

  console.log('🎉 人生博物馆（完整版）已加载！');
})();
</script>
